<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Custom Video Speed Controller | Advanced Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* avoid accidental text selection on buttons */
    }

    body {
      background: linear-gradient(145deg, #0b2b2b 0%, #0a1f1f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 20px;
    }

    /* main player container */
    .player {
      max-width: 980px;
      width: 100%;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 32px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(2px);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* video element */
    .player__video {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
      cursor: pointer;
    }

    /* controls panel */
    .player__controls {
      background: rgba(20, 20, 30, 0.92);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.1s;
    }

    /* progress bar container */
    .progress {
      flex: 4;
      min-width: 160px;
      height: 8px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      cursor: pointer;
      position: relative;
      transition: height 0.1s ease;
    }

    .progress:hover {
      height: 12px;
    }

    .progress__filled {
      width: 0%;
      background: linear-gradient(90deg, #ff6a3d, #ff3a6f);
      border-radius: 20px;
      height: 100%;
      transition: width 0.05s linear;
      position: relative;
      box-shadow: 0 0 4px #ff5e3a;
    }

    /* play/pause toggle button */
    .player__button {
      background: #2c2f36;
      border: none;
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 40px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: 0.2s;
      font-family: monospace;
      letter-spacing: 1px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .player__button:hover {
      background: #ff5e3a;
      transform: scale(0.96);
      color: white;
    }

    /* skip buttons style */
    .skip-btn {
      background: #1e2a2e;
      font-size: 1rem;
      font-weight: 600;
      padding: 8px 16px;
      letter-spacing: 0.5px;
    }

    .skip-btn:hover {
      background: #3a506c;
      transform: translateY(-2px);
    }

    /* range inputs style */
    input[type="range"] {
      -webkit-appearance: none;
      background: transparent;
      width: 130px;
      cursor: pointer;
    }

    input[type="range"]:focus {
      outline: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 5px;
      background: #40444e;
      border-radius: 5px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #ff6a3d;
      margin-top: -5.5px;
      box-shadow: 0 1px 3px black;
      border: none;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #ff8c5a;
      transform: scale(1.2);
    }

    input[type="range"]::-webkit-slider-runnable-track {
      background: #2c2f36;
    }

    .controls__label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #ddd;
      background: rgba(0,0,0,0.4);
      padding: 4px 12px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    .controls__label span {
      font-weight: bold;
      color: #ffaa80;
    }

    /* volume + speed value indicators */
    .value-indicator {
      min-width: 38px;
      text-align: center;
      font-size: 0.8rem;
      background: #00000066;
      border-radius: 20px;
      padding: 2px 6px;
    }

    /* responsive row wrapping */
    @media (max-width: 700px) {
      .player__controls {
        gap: 10px;
      }
      .progress {
        order: -1;
        width: 100%;
        flex: auto;
        margin-bottom: 6px;
      }
      input[type="range"] {
        width: 100px;
      }
      .controls__label {
        padding: 2px 8px;
      }
    }

    .flex-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    hr {
      display: none;
    }
  </style>
</head>
<body>

<div class="player">
  <!-- video element with required source -->
  <video class="player__video" width="100%" height="auto" preload="metadata">
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
  </video>

  <div class="player__controls">
    <!-- Progress bar container -->
    <div class="progress">
      <div class="progress__filled"></div>
    </div>

    <!-- Play/Pause toggle button (► and ❚ ❚) -->
    <button class="player__button" data-action="playpause">►</button>

    <!-- Rewind 10 seconds button -->
    <button class="player__button skip-btn" data-skip="-10">« 10s</button>

    <!-- Forward 25 seconds button -->
    <button class="player__button skip-btn" data-skip="25">25s »</button>

    <!-- Volume control with label and value -->
    <div class="controls__label">
      <span>🔊</span>
      <input type="range" name="volume" id="volume" min="0" max="1" step="0.01" value="0.75">
      <span id="volumeValue" class="value-indicator">75%</span>
    </div>

    <!-- Playback speed control with label and value -->
    <div class="controls__label">
      <span>⚡</span>
      <input type="range" name="playbackSpeed" id="playbackSpeed" min="0.5" max="2.5" step="0.05" value="1">
      <span id="speedValue" class="value-indicator">1.00x</span>
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- DOM elements -----
    const video = document.querySelector('.player__video');
    const progressFilled = document.querySelector('.progress__filled');
    const progressContainer = document.querySelector('.progress');
    const playPauseBtn = document.querySelector('.player__button[data-action="playpause"]');
    const skipBtns = document.querySelectorAll('[data-skip]');
    const volumeSlider = document.getElementById('volume');
    const speedSlider = document.getElementById('playbackSpeed');
    const volumeValueSpan = document.getElementById('volumeValue');
    const speedValueSpan = document.getElementById('speedValue');

    // ----- Helper functions -----
    function formatVolumePercent(value) {
      return Math.round(value * 100) + '%';
    }

    function formatSpeed(value) {
      return value.toFixed(2) + 'x';
    }

    // update volume UI and video property
    function updateVolume() {
      if (!video) return;
      let vol = parseFloat(volumeSlider.value);
      if (isNaN(vol)) vol = 0.75;
      video.volume = vol;
      volumeValueSpan.textContent = formatVolumePercent(vol);
    }

    // update playback speed UI and video property
    function updatePlaybackSpeed() {
      if (!video) return;
      let speed = parseFloat(speedSlider.value);
      if (isNaN(speed)) speed = 1.0;
      video.playbackRate = speed;
      speedValueSpan.textContent = formatSpeed(speed);
    }

    // update progress bar fill based on video currentTime/duration
    function updateProgressFill() {
      if (!video || !progressFilled) return;
      const duration = video.duration;
      if (isFinite(duration) && duration > 0) {
        const percent = (video.currentTime / duration) * 100;
        progressFilled.style.width = `${percent}%`;
      } else {
        progressFilled.style.width = '0%';
      }
    }

    // toggle play/pause and update button icon (► / ❚ ❚)
    function togglePlayPause() {
      if (!video) return;
      if (video.paused || video.ended) {
        video.play().catch(e => console.warn("Playback prevented:", e));
        playPauseBtn.textContent = '❚ ❚';   // pause symbol
      } else {
        video.pause();
        playPauseBtn.textContent = '►';      // play symbol
      }
    }

    // sync play/pause button when video state changes (play, pause, ended)
    function syncPlayPauseButton() {
      if (!video || !playPauseBtn) return;
      if (video.paused || video.ended) {
        playPauseBtn.textContent = '►';
      } else {
        playPauseBtn.textContent = '❚ ❚';
      }
    }

    // skip video by seconds (positive = forward, negative = rewind)
    function skipVideo(seconds) {
      if (!video) return;
      let newTime = video.currentTime + seconds;
      // clamp between 0 and video duration
      if (newTime < 0) newTime = 0;
      if (video.duration && newTime > video.duration) newTime = video.duration;
      video.currentTime = newTime;
      // update progress bar immediately after seeking
      updateProgressFill();
    }

    // scrub progress bar (set video time based on click / drag position)
    function scrubProgress(e) {
      if (!video || !progressContainer) return;
      // get click coordinates relative to progress bar
      const rect = progressContainer.getBoundingClientRect();
      let clientX;
      if (e.type === 'mousemove' && !e.buttons) return; // only when dragging (left button pressed)
      if (e.type === 'click' || (e.type === 'mousemove' && e.buttons === 1)) {
        clientX = e.clientX;
      } else {
        return;
      }
      const width = rect.width;
      let clickX = clientX - rect.left;
      if (clickX < 0) clickX = 0;
      if (clickX > width) clickX = width;
      const percent = clickX / width;
      if (video.duration && isFinite(video.duration)) {
        video.currentTime = percent * video.duration;
        updateProgressFill();
      }
    }

    // ----- Event listeners for video -----
    if (video) {
      // update progress bar as time updates
      video.addEventListener('timeupdate', updateProgressFill);
      // when metadata loaded, ensure initial progress bar is zero
      video.addEventListener('loadedmetadata', () => {
        updateProgressFill();
        // sync volume & speed after metadata to be safe
        updateVolume();
        updatePlaybackSpeed();
      });
      // when video can play, sync again
      video.addEventListener('canplay', updateProgressFill);
      // play & pause events to sync button icon
      video.addEventListener('play', syncPlayPauseButton);
      video.addEventListener('pause', syncPlayPauseButton);
      video.addEventListener('ended', () => {
        syncPlayPauseButton();
        updateProgressFill();  // ensure full progress if ended
      });
      // initial set: set volume & speed from sliders
      video.addEventListener('loadeddata', () => {
        updateVolume();
        updatePlaybackSpeed();
      });
    }

    // ----- Progress bar scrubbing (click and drag) -----
    if (progressContainer) {
      progressContainer.addEventListener('click', scrubProgress);
      // drag to scrub: mousemove with left button held down
      progressContainer.addEventListener('mousemove', scrubProgress);
      // optional: disable default dragging effect on progress bar
      progressContainer.addEventListener('dragstart', (e) => e.preventDefault());
    }

    // ----- Play/Pause button logic -----
    if (playPauseBtn) {
      playPauseBtn.addEventListener('click', togglePlayPause);
    }

    // clicking on video itself should also toggle play/pause (good UX)
    if (video) {
      video.addEventListener('click', togglePlayPause);
    }

    // ----- Skip buttons (rewind 10s / forward 25s) -----
    skipBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const skipValue = btn.getAttribute('data-skip');
        if (skipValue !== null) {
          const seconds = parseFloat(skipValue);
          if (!isNaN(seconds)) {
            skipVideo(seconds);
          }
        }
        e.stopPropagation();
      });
    });

    // ----- Volume control -----
    if (volumeSlider) {
      volumeSlider.addEventListener('input', (e) => {
        updateVolume();
      });
      volumeSlider.addEventListener('change', updateVolume);
      // initial set
      updateVolume();
    }

    // ----- Playback speed control -----
    if (speedSlider) {
      speedSlider.addEventListener('input', (e) => {
        updatePlaybackSpeed();
      });
      speedSlider.addEventListener('change', updatePlaybackSpeed);
      updatePlaybackSpeed();
    }

    // ----- Additional safety: ensure video source is exactly as required -----
    // The video element src is already set via <source> tag with the required URL.
    // But to be 100% robust, we also check if the video source is correctly set.
    // The given HTML structure originally had src inside video, but requirement: "src="https://www.w3schools.com/html/mov_bbb.mp4"
    // In the player we have <source> with that exact URL. Perfect.
    // For older browser fallback, we could force the src property.
    if (video && !video.querySelector('source')) {
      // just safety: but our HTML has source inside, so not needed.
    }
    // Double-check that video source points to the provided URL, else fix it (just in case)
    const currentSource = video.querySelector('source');
    if (currentSource && currentSource.getAttribute('src') !== 'https://www.w3schools.com/html/mov_bbb.mp4') {
      currentSource.setAttribute('src', 'https://www.w3schools.com/html/mov_bbb.mp4');
      video.load();
    } else if (!currentSource) {
      // edge case: inject source element
      const newSource = document.createElement('source');
      newSource.setAttribute('src', 'https://www.w3schools.com/html/mov_bbb.mp4');
      newSource.setAttribute('type', 'video/mp4');
      video.appendChild(newSource);
      video.load();
    }

    // Edge: initialize progress on startup before metadata (show zero)
    updateProgressFill();

    // Show volume & speed initial values on display
    if (volumeSlider) volumeValueSpan.textContent = formatVolumePercent(volumeSlider.value);
    if (speedSlider) speedValueSpan.textContent = formatSpeed(parseFloat(speedSlider.value));

    // Additional small fix: when video duration changes after metadata re-run fill
    video.addEventListener('durationchange', updateProgressFill);
    video.addEventListener('seeked', updateProgressFill);

    // prevent default keyboard shortcuts interfering? not needed, but adds polish
    window.addEventListener('keydown', (e) => {
      // Spacebar toggles play/pause (prevent page scroll)
      if (e.code === 'Space' && document.activeElement !== volumeSlider && document.activeElement !== speedSlider) {
        e.preventDefault();
        togglePlayPause();
      }
      // left/right arrow skip small amounts (optional bonus UX)
      if (e.code === 'ArrowLeft') {
        e.preventDefault();
        skipVideo(-5);
      }
      if (e.code === 'ArrowRight') {
        e.preventDefault();
        skipVideo(5);
      }
    });
  })();
</script>
</body>
</html>
